<div class="container mt-5">

  <div class="card p-5 shadow mx-auto" style="max-width:500px;">

    <h1 class="mb-4 text-center">🔐 Connexion Admin</h1>

    <input
      [(ngModel)]="email"
      class="form-control mb-3"
      placeholder="Email">

    <input
      [(ngModel)]="password"
      type="password"
      class="form-control mb-3"
      placeholder="Mot de passe">

    <button
      (click)="connexion()"
      class="btn btn-primary w-100">
      Se connecter
    </button>

    <p class="text-danger mt-3 text-center">
      {{ erreur }}
    </p>

  </div>

</div>
