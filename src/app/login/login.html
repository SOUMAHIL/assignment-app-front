<div class="container mt-5">

  <div class="card p-5 shadow mx-auto" style="max-width:500px;">

    <h1 class="mb-4 text-center">🔐 Connexion Admin</h1>

    <input
      [(ngModel)]="email"
      class="form-control mb-3"
      placeholder="Email">

    <input
      [(ngModel)]="password"
      type="password"
      class="form-control mb-3"
      placeholder="Mot de passe">

    <button
      (click)="connexion()"
      class="btn btn-primary w-100"
      [disabled]="chargement">
      {{ chargement ? 'Connexion...' : 'Se connecter' }}
    </button>

    <p class="text-danger mt-3 text-center">
      {{ erreur }}
    </p>

    <!-- ================================================ -->
    <!-- ACCÈS DE TEST — Pour le professeur               -->
    <!-- ================================================ -->
    <div class="mt-4 p-3 rounded" style="background:#f8f9fa; border:1px dashed #ccc;">
      <p class="mb-1 text-muted text-center" style="font-size:13px;">
        <strong>🧑‍🏫 Accès professeur (test)</strong>
      </p>
      <p class="mb-1 text-center" style="font-size:13px;">
        📧 <code>admin@assignment.com</code>
      </p>
      <p class="mb-0 text-center" style="font-size:13px;">
        🔑 <code>Admin123!</code>
      </p>
    </div>

  </div>

</div>
